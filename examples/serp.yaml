selector:
  - '#rso > div:not(.g) > div:not(.g, .jtfYYd)' # comment
  - .g

items:
  union:
    # regular result
    - selector: .tF2Cxc
      properties:
        title: { selector: h3 }
    - selector: $self
      properties:
        html: { selector: $self, transform: html }
        type: { constant: non-matched }
